name: Release discipline

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build package
        run: npm run build

      - name: Pack tarball
        run: npm pack --json

      - name: Verify tarball contents and import smoke test
        run: npm run verify:packaging
